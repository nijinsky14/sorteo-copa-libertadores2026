<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Profesional Sorteo Libertadores</title>
<style>
body{font-family:Arial;background:#0b0b0b;color:white;text-align:center;margin:0}
header{padding:20px;font-size:32px;font-weight:bold;color:#e3b341}
.container{max-width:1200px;margin:auto;padding:20px}
.controls{margin-bottom:20px}
button{padding:12px 22px;font-size:17px;border-radius:8px;border:none;cursor:pointer;background:#e3b341;color:black;font-weight:bold;margin:6px}
button:hover{opacity:0.9}

.grupos{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:25px}
.grupo{background:#1b1b1b;border-radius:12px;padding:14px;box-shadow:0 0 12px rgba(0,0,0,0.6);min-height:170px}
.grupo h3{margin-top:0;color:#e3b341}

.team{padding:7px 0;border-bottom:1px solid #333;font-size:14px;display:flex;align-items:center;gap:10px}
.team:last-child{border-bottom:none}

.logo{width:22px;height:22px;border-radius:50%;object-fit:contain;background:white}
.flag{font-size:16px}
.country{font-size:12px;color:#aaa;margin-left:auto}

.bolilleros{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:20px}
.bol{background:#151515;padding:10px;border-radius:10px}
.bol h4{margin:0 0 10px 0;color:#e3b341}
.ball{background:#2a2a2a;margin:4px;padding:6px;border-radius:6px;font-size:14px}

.drawBox{margin-top:20px;font-size:22px;font-weight:bold;min-height:30px}

.stats{margin-top:30px;font-size:14px;color:#ccc;text-align:left}

</style>
</head>

<body>
<header>Simulador Sorteo Libertadores</header>
<div class="container">
  <div class="controls">
    <button onclick="sortearPasoAPaso()">🎲 Sorteo paso a paso</button>
    
    <button onclick="simularCentral()" style="display: none;">🧠 Probabilidad grupo Central</button>
    <button onclick="probabilidadRivales()" style="display: none;">⚽ Probabilidad rivales Central</button>
    <button onclick="simular1000()" style="display: none;">📊 Simular 1000</button>
    
    <button onclick="compartir()">📱 Compartir</button>
</div>

<div class="drawBox" id="drawBox"></div>

<div class="bolilleros" id="bolilleros"></div>

<div class="grupos" id="grupos"></div>

<div class="stats" id="stats"></div>

</div>

<script>

const flags={ARG:"🇦🇷",BRA:"🇧🇷",URU:"🇺🇾",ECU:"🇪🇨",PAR:"🇵🇾",COL:"🇨🇴",PER:"🇵🇪",BOL:"🇧🇴",CHI:"🇨🇱",VEN:"🇻🇪"}
function flag(code){return flags[code]||"🏳️"}

const escudos = {
  "Lanús": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Escudo_del_Club_Atletico_Lan%C3%BAs.png/330px-Escudo_del_Club_Atletico_Lan%C3%BAs.png",
  "Platense": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Club_Alt%C3%A9tico_Platense_crest_%282025%29.svg/250px-Club_Alt%C3%A9tico_Platense_crest_%282025%29.svg.png",
  "Estudiantes": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Estudiantes_de_la_Plata_crest_%282025%29.svg/330px-Estudiantes_de_la_Plata_crest_%282025%29.svg.png",
  "Independiente Rivadavia": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Escudo_del_Club_Independiente_Rivadavia.svg/330px-Escudo_del_Club_Independiente_Rivadavia.svg.png",
  "Rosario Central": "https://i.pinimg.com/736x/ec/95/0e/ec950e5576ca874f5a2defc7d6f5964e.jpg",
  "Boca Juniors": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/CABJ70.png/330px-CABJ70.png",

  "Flamengo": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Clube_de_Regatas_do_Flamengo_logo.svg/330px-Clube_de_Regatas_do_Flamengo_logo.svg.png",
  "Palmeiras": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/SE_Palmeiras_2025_crest.png/330px-SE_Palmeiras_2025_crest.png",
  "Peñarol": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Escudo-club-atletico-penarol.png/250px-Escudo-club-atletico-penarol.png",
  "Nacional": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Club_Nacional_de_Football.png/330px-Club_Nacional_de_Football.png",
  "Atlético Mineiro": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/LOGO_5TA._ESTRELLA.png/330px-LOGO_5TA._ESTRELLA.png",
  "Fluminense": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Fluminense_FC_escudo.png/330px-Fluminense_FC_escudo.png",
  "Independiente del Valle": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Escudoindependientedelvalle2023.png/330px-Escudoindependientedelvalle2023.png",
  "Libertad": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Club_Libertad.png/500px-Club_Libertad.png",
  "Cerro Porteño": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Escudo_Club_Cerro_Porte%C3%B1o_2023-Actual.svg/330px-Escudo_Club_Cerro_Porte%C3%B1o_2023-Actual.svg.png",
  "Corinthians": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Corinthians_Escudo.jpg/330px-Corinthians_Escudo.jpg",
  "Bolívar": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Emblem_bolivar.png/330px-Emblem_bolivar.png",
  "Cruzeiro": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Cruzeiro_Esporte_Clube_%28logo%29.svg/330px-Cruzeiro_Esporte_Clube_%28logo%29.svg.png",
  "Universitario": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Logo_oficial_de_Universitario.png/330px-Logo_oficial_de_Universitario.png",
  "Junior": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/ESCUDO_JUNIOR.svg/330px-ESCUDO_JUNIOR.svg.png",
  "Universidad Católica": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Escudo_Club_Deportivo_Universidad_Cat%C3%B3lica.svg/330px-Escudo_Club_Deportivo_Universidad_Cat%C3%B3lica.svg.png",
  "Santa Fe": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Escudo_de_Independiente_Santa_Fe.png/330px-Escudo_de_Independiente_Santa_Fe.png",
  "Always Ready": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Club_Always_Ready_Bol%C3%ADvia.png/330px-Club_Always_Ready_Bol%C3%ADvia.png",
  "Colo Colo": "https://i.pinimg.com/736x/ea/8b/87/ea8b87832024ec39abac8ffe28a91feb.jpg",
  "Deportivo La Guaira": "https://upload.wikimedia.org/wikipedia/en/thumb/f/fa/Deportivo_La_Guaira_logo.png/120px-Deportivo_La_Guaira_logo.png",
  "Caracas": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/soccer/500/11995.png&h=200&w=200",
  "The Strongest": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/soccer/500/10094.png&h=200&w=200",
  "Mirassol": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Mirassol_FC_logo.png/330px-Mirassol_FC_logo.png",
  "Independiente Medellín": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Escudo_del_Deportivo_Independiente_Medell%C3%ADn.png/330px-Escudo_del_Deportivo_Independiente_Medell%C3%ADn.png",
  "Deportes Tolima": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Escudo_del_Deportes_Tolima.svg/330px-Escudo_del_Deportes_Tolima.svg.png",
  "Sporting Cristal": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Escudo_de_Sporting_Cristal_2025.svg/250px-Escudo_de_Sporting_Cristal_2025.svg.png",
  "Barcelona SC": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Barcelona_Sporting_Club_Logo.png/330px-Barcelona_Sporting_Club_Logo.png"
};


const flamengo={nombre:"Flamengo",pais:"BRA"}

const bol1=[
{nombre:"Palmeiras",pais:"BRA"},
{nombre:"Boca Juniors",pais:"ARG"},
{nombre:"Peñarol",pais:"URU"},
{nombre:"Nacional",pais:"URU"},
{nombre:"LDU Quito",pais:"ECU"},
{nombre:"Fluminense",pais:"BRA"},
{nombre:"Ind. del Valle",pais:"ECU"}
]

const bol2=[
{nombre:"Lanús",pais:"ARG"},
{nombre:"Libertad",pais:"PAR"},
{nombre:"Estudiantes",pais:"ARG"},
{nombre:"Cerro Porteño",pais:"PAR"},
{nombre:"Corinthians",pais:"BRA"},
{nombre:"Bolívar",pais:"BOL"},
{nombre:"Cruzeiro",pais:"BRA"},
{nombre:"Universitario",pais:"PER"}
]

const bol3=[
{nombre:"Junior",pais:"COL"},
{nombre:"U Católica",pais:"CHI"},
{nombre:"Rosario Central",pais:"ARG"},
{nombre:"Santa Fe",pais:"COL"},
{nombre:"Always Ready",pais:"BOL"},
{nombre:"Coquimbo",pais:"CHI"},
{nombre:"La Guaira",pais:"VEN"},
{nombre:"Cusco",pais:"PER"}
]

const bol4=[
{nombre:"Universidad Central",pais:"VEN"},
{nombre:"Platense",pais:"ARG"},
{nombre:"Ind. Rivadavia",pais:"ARG"},
{nombre:"Mirassol",pais:"BRA"},
{nombre:"Ind. Medellín",pais:"COL"},
{nombre:"Tolima",pais:"COL"},
{nombre:"Sporting Cristal",pais:"PER"},
{nombre:"Barcelona",pais:"ECU"}
]

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function mostrarBolilleros(){
let html=""
let bols=[bol1,bol2,bol3,bol4]
bols.forEach((b,i)=>{
html+=`<div class="bol"><h4>Bolillero ${i+1}</h4>${b.map(t=>`<div class="ball">${flag(t.pais)} ${t.nombre}</div>`).join("")}</div>`
})
bolilleros.innerHTML=html
}

function crearGruposBase(){
let grupos=[[],[],[],[],[],[],[],[]]
grupos[0].push(flamengo)
let b1=shuffle([...bol1])
for(let i=1;i<8;i++){grupos[i].push(b1[i-1])}
return grupos
}

function agregarEquipos(grupos,bol){
bol=shuffle([...bol])
bol.forEach(eq=>{
 for(let g of grupos){
 let paises=g.map(t=>t.pais)
 if(!paises.includes(eq.pais)&&g.length<4){g.push(eq);return}
 }
})
}

function generarSorteo(){
let grupos=crearGruposBase()
agregarEquipos(grupos,bol2)
agregarEquipos(grupos,bol3)
agregarEquipos(grupos,bol4)
return grupos
}

function mostrar(grupos){
let letras=["A","B","C","D","E","F","G","H"]
let html=""

grupos.forEach((g,i)=>{
html+=`<div class="grupo"><h3>Grupo ${letras[i]}</h3>${g.map(t=>`<div class="team"><img class="logo" src="${logo(t.nombre)}"><span class="flag">${flag(t.pais)}</span><span>${t.nombre}</span><span class="country">${t.pais}</span></div>`).join("")}</div>`
})

gruposDiv.innerHTML=html

// guardar en URL
let data=btoa(JSON.stringify(grupos))
history.replaceState(null,"","?sorteo="+data)
}

async function sortearPasoAPaso(){
let box=document.getElementById("drawBox")
box.innerText="Preparando bolilleros...";await esperar(700)
box.innerText="Sorteando cabezas de serie...";await esperar(700)
let grupos=crearGruposBase();mostrar(grupos)
await esperar(700)
box.innerText="Bolillero 2";agregarEquipos(grupos,bol2);mostrar(grupos)
await esperar(700)
box.innerText="Bolillero 3";agregarEquipos(grupos,bol3);mostrar(grupos)
await esperar(700)
box.innerText="Bolillero 4";agregarEquipos(grupos,bol4);mostrar(grupos)
box.innerText="Sorteo terminado"
}

function esperar(ms){return new Promise(r=>setTimeout(r,ms))}

function simularCentral(){
let conteo={}
for(let i=0;i<5000;i++){
let grupos=generarSorteo()
grupos.forEach((g,gi)=>{
let grupo=String.fromCharCode(65+gi)
if(g.find(t=>t.nombre=="Rosario Central")){
conteo[grupo]=(conteo[grupo]||0)+1
}
})
}
let texto="Probabilidad de grupo para Rosario Central (5000 simulaciones):<br><br>"
Object.keys(conteo).sort().forEach(g=>{texto+=`Grupo ${g}: ${conteo[g]}<br>`})
stats.innerHTML=texto
}

function probabilidadRivales(){
let conteo={}
for(let i=0;i<5000;i++){
let grupos=generarSorteo()
let g=grupos.find(gr=>gr.find(t=>t.nombre=="Rosario Central"))
g.forEach(t=>{
if(t.nombre!="Rosario Central"){
conteo[t.nombre]=(conteo[t.nombre]||0)+1
}
})
}

let texto="Probabilidad de rivales de Rosario Central:<br><br>"
Object.keys(conteo).sort((a,b)=>conteo[b]-conteo[a]).forEach(t=>{
texto+=`${t}: ${conteo[t]} veces<br>`
})

stats.innerHTML=texto
}

function simular1000(){for(let i=0;i<1000;i++)generarSorteo();alert("1000 sorteos simulados")}

function compartir(){
if(navigator.share){
navigator.share({title:"Simulador Libertadores",text:"Probá este simulador",url:window.location.href})
}else{
navigator.clipboard.writeText(window.location.href)
alert("Link copiado")
}
}

const gruposDiv=document.getElementById("grupos")

// cargar sorteo desde URL
const params=new URLSearchParams(window.location.search)
if(params.get("sorteo")){
let grupos=JSON.parse(atob(params.get("sorteo")))
mostrar(grupos)
}

mostrarBolilleros()

</script>
</body>
</html>
