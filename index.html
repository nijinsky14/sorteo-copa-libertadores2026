<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Profesional Sorteo Libertadores</title>
<style>
body{font-family:Arial;background:#0b0b0b;color:white;text-align:center;margin:0}
header{padding:20px;font-size:32px;font-weight:bold;color:#e3b341}
.container{max-width:1200px;margin:auto;padding:20px}
.controls{margin-bottom:20px}
button{padding:12px 22px;font-size:17px;border-radius:8px;border:none;cursor:pointer;background:#e3b341;color:black;font-weight:bold;margin:6px}
button:hover{opacity:0.9}

.grupos{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:25px}
.grupo{background:#1b1b1b;border-radius:12px;padding:14px;box-shadow:0 0 12px rgba(0,0,0,0.6);min-height:170px}
.grupo h3{margin-top:0;color:#e3b341}

.team{padding:7px 0;border-bottom:1px solid #333;font-size:14px;display:flex;align-items:center;gap:10px}
.team:last-child{border-bottom:none}

.logo{width:26px;height:26px;border-radius:50%;object-fit:cover;background:#fff;border:1px solid #444;flex:0 0 26px}
.flag-img{width:22px;height:16px;object-fit:cover;border-radius:3px;vertical-align:middle;flex:0 0 22px}
.country{font-size:12px;color:#aaa;margin-left:auto}

.bolilleros{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:20px}
.bol{background:#151515;padding:10px;border-radius:10px}
.bol h4{margin:0 0 10px 0;color:#e3b341}
.ball{background:#2a2a2a;margin:4px;padding:6px;border-radius:6px;font-size:14px}

.drawBox{margin-top:20px;font-size:22px;font-weight:bold;min-height:30px}

.stats{margin-top:30px;font-size:14px;color:#ccc;text-align:left}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:#1b1b1b;border-radius:14px;padding:24px;max-width:480px;width:90%;box-shadow:0 0 30px rgba(0,0,0,0.8)}
.modal-box h3{color:#e3b341;margin-top:0}
.modal-box textarea{width:100%;height:220px;background:#0b0b0b;color:#eee;border:1px solid #444;border-radius:8px;padding:10px;font-size:13px;resize:none;box-sizing:border-box}
.modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:center}
.btn-wa{background:#25D366;color:white;font-weight:bold}
.btn-copy{background:#e3b341;color:black;font-weight:bold}
.btn-close{background:#444;color:white}

</style>
</head>

<body>
<header>Simulador Sorteo Libertadores</header>
<div class="container">
  <div class="controls">
    <button onclick="sortearPasoAPaso()">🎲 Sorteo paso a paso</button>
    
    <button onclick="simularCentral()" style="display: none;">🧠 Probabilidad grupo Central</button>
    <button onclick="probabilidadRivales()" style="display: none;">⚽ Probabilidad rivales Central</button>
    <button onclick="simular1000()" style="display: none;">📊 Simular 1000</button>
    
    <button onclick="compartir()">📱 Compartir</button>
</div>

<div class="drawBox" id="drawBox"></div>

<div class="bolilleros" id="bolilleros"></div>

<div class="grupos" id="grupos"></div>

<div class="stats" id="stats"></div>

</div>

<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <h3>📋 Resultado del sorteo</h3>
    <textarea id="shareText" readonly></textarea>
    <div class="modal-btns">
      <button class="btn-copy" onclick="copiarTexto()">📋 Copiar</button>
      <button class="btn-wa" onclick="abrirWhatsApp()">💬 WhatsApp</button>
      <button class="btn-close" onclick="cerrarModal()">✕ Cerrar</button>
    </div>
  </div>
</div>

<script>

const flagCodes={ARG:"ar",BRA:"br",URU:"uy",ECU:"ec",PAR:"py",COL:"co",PER:"pe",BOL:"bo",CHI:"cl",VEN:"ve"}
const countryNames={
ARG:"Argentina",BRA:"Brasil",URU:"Uruguay",ECU:"Ecuador",PAR:"Paraguay",
COL:"Colombia",PER:"Perú",BOL:"Bolivia",CHI:"Chile",VEN:"Venezuela"
}
function flag(code){const c=flagCodes[code];return c?`<img class="flag-img" src="https://flagcdn.com/20x15/${c}.png" alt="${code}" title="${countryNames[code]||code}">`:""}

const logos={
"Flamengo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Clube_de_Regatas_do_Flamengo_logo.svg/330px-Clube_de_Regatas_do_Flamengo_logo.svg.png",

"Boca Juniors":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/CABJ70.png/330px-CABJ70.png",
"Peñarol":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Escudo-club-atletico-penarol.png/250px-Escudo-club-atletico-penarol.png",
"Nacional":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Club_Nacional_de_Football.png/330px-Club_Nacional_de_Football.png",
"LDU Quito":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/LOGO_5TA._ESTRELLA.png/330px-LOGO_5TA._ESTRELLA.png",
"Fluminense":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Fluminense_FC_escudo.png/330px-Fluminense_FC_escudo.png",
"Ind. del Valle":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Escudoindependientedelvalle2023.png/330px-Escudoindependientedelvalle2023.png",
"Lanús":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Escudo_del_Club_Atletico_Lan%C3%BAs.png/330px-Escudo_del_Club_Atletico_Lan%C3%BAs.png",
"Libertad":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Club_Libertad.png/500px-Club_Libertad.png",
"Estudiantes":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Estudiantes_de_la_Plata_crest_%282025%29.svg/330px-Estudiantes_de_la_Plata_crest_%282025%29.svg.png",
"Cerro Porteño":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Escudo_Club_Cerro_Porte%C3%B1o_2023-Actual.svg/330px-Escudo_Club_Cerro_Porte%C3%B1o_2023-Actual.svg.png",
"Corinthians":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Corinthians_Escudo.jpg/330px-Corinthians_Escudo.jpg",
"Bolívar":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Emblem_bolivar.png/330px-Emblem_bolivar.png",

"Rosario Central":"https://i.pinimg.com/736x/ec/95/0e/ec950e5576ca874f5a2defc7d6f5964e.jpg",

"Always Ready":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Club_Always_Ready_Bol%C3%ADvia.png/330px-Club_Always_Ready_Bol%C3%ADvia.png",
"Coquimbo":"https://i.pinimg.com/736x/ea/8b/87/ea8b87832024ec39abac8ffe28a91feb.jpg",

"Cusco":"https://a.espncdn.com/combiner/i?img=/i/teamlogos/soccer/500/11995.png&h=200&w=200",

"Platense":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Club_Alt%C3%A9tico_Platense_crest_%282025%29.svg/250px-Club_Alt%C3%A9tico_Platense_crest_%282025%29.svg.png",
"Ind. Rivadavia":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Escudo_del_Club_Independiente_Rivadavia.svg/330px-Escudo_del_Club_Independiente_Rivadavia.svg.png",
"Mirassol":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Mirassol_FC_logo.png/330px-Mirassol_FC_logo.png",
"Ind. Medellín":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Escudo_del_Deportivo_Independiente_Medell%C3%ADn.png/330px-Escudo_del_Deportivo_Independiente_Medell%C3%ADn.png",
"Tolima":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Escudo_del_Deportes_Tolima.svg/330px-Escudo_del_Deportes_Tolima.svg.png",
"Sporting Cristal":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Escudo_de_Sporting_Cristal_2025.svg/250px-Escudo_de_Sporting_Cristal_2025.svg.png",
"Barcelona":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Barcelona_Sporting_Club_Logo.png/330px-Barcelona_Sporting_Club_Logo.png"
}

function crearEscudoLocal(equipo){
const iniciales=equipo.nombre.split(" ").map(p=>p[0]).join("").slice(0,3).toUpperCase()
const colores={
ARG:["#6ec1ff","#ffffff"],BRA:["#1f9d55","#f5c518"],URU:["#8ec5ff","#ffffff"],
ECU:["#f5c518","#1f3b73"],PAR:["#d92626","#ffffff"],COL:["#f5c518","#1f3b73"],
PER:["#d92626","#ffffff"],BOL:["#1f9d55","#d92626"],CHI:["#1f3b73","#d92626"],VEN:["#f5c518","#1f3b73"]
}
const [c1,c2]=colores[equipo.pais]||["#1f3b73","#ffffff"]
const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'>
<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='${c1}'/><stop offset='100%' stop-color='${c2}'/></linearGradient></defs>
<circle cx='20' cy='20' r='19' fill='url(#g)' stroke='#111' stroke-width='2'/>
<text x='20' y='24' text-anchor='middle' font-family='Arial' font-size='12' font-weight='700' fill='#111'>${iniciales}</text>
</svg>`
return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`
}

function logo(equipo){return logos[equipo.nombre]||crearEscudoLocal(equipo)}

const bol1=[
{nombre:"Flamengo",pais:"BRA"},
{nombre:"Palmeiras",pais:"BRA"},
{nombre:"Boca Juniors",pais:"ARG"},
{nombre:"Peñarol",pais:"URU"},
{nombre:"Nacional",pais:"URU"},
{nombre:"LDU Quito",pais:"ECU"},
{nombre:"Fluminense",pais:"BRA"},
{nombre:"Ind. del Valle",pais:"ECU"}
]

const bol2=[
{nombre:"Libertad",pais:"PAR"},
{nombre:"Estudiantes",pais:"ARG"},
{nombre:"Cerro Porteño",pais:"PAR"},
{nombre:"Lanús",pais:"ARG"},
{nombre:"Corinthians",pais:"BRA"},
{nombre:"Bolívar",pais:"BOL"},
{nombre:"Cruzeiro",pais:"BRA"},
{nombre:"Universitario",pais:"PER"}
]

const bol3=[
{nombre:"Junior",pais:"COL"},
{nombre:"U Católica",pais:"CHI"},
{nombre:"Rosario Central",pais:"ARG"},
{nombre:"Santa Fe",pais:"COL"},
{nombre:"Always Ready",pais:"BOL"},
{nombre:"Coquimbo",pais:"CHI"},
{nombre:"La Guaira",pais:"VEN"},
{nombre:"Cusco",pais:"PER"}
]

const bol4=[
{nombre:"Universidad Central",pais:"VEN"},
{nombre:"Platense",pais:"ARG"},
{nombre:"Ind. Rivadavia",pais:"ARG"},
{nombre:"Mirassol",pais:"BRA"},
{nombre:"Barcelona",pais:"ECU"},
{nombre:"Sporting Cristal",pais:"PER"},
{nombre:"Tolima",pais:"COL"},
{nombre:"Ind. Medellín",pais:"COL"}
]

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function mostrarBolilleros(){
let html=""
let bols=[bol1,bol2,bol3,bol4]
bols.forEach((b,i)=>{
html+=`<div class="bol"><h4>Bolillero ${i+1}</h4>${b.map(t=>`<div class="ball">${flag(t.pais)} ${t.nombre}</div>`).join("")}</div>`
})
bolilleros.innerHTML=html
}

function crearGruposBase(){
let grupos=[[],[],[],[],[],[],[],[]]
let b1=shuffle([...bol1])
for(let i=0;i<8;i++){grupos[i].push(b1[i])}
return grupos
}

function asignarBolilleroConBacktracking(grupos,equipos,grupoIndex=0){
if(grupoIndex===grupos.length)return true

const paisesGrupo=grupos[grupoIndex].map(t=>t.pais)
const candidatos=shuffle(equipos.filter(eq=>!paisesGrupo.includes(eq.pais)))

for(const eq of candidatos){
grupos[grupoIndex].push(eq)
const restantes=equipos.filter(t=>t!==eq)
if(asignarBolilleroConBacktracking(grupos,restantes,grupoIndex+1))return true
grupos[grupoIndex].pop()
}

return false
}

function agregarEquipos(grupos,bol){
return asignarBolilleroConBacktracking(grupos,shuffle([...bol]))
}

function generarSorteo(){
for(let intento=0;intento<300;intento++){
let grupos=crearGruposBase()
const ok2=agregarEquipos(grupos,bol2)
const ok3=ok2&&agregarEquipos(grupos,bol3)
const ok4=ok3&&agregarEquipos(grupos,bol4)
if(ok4)return grupos
}

throw new Error("No se pudo generar un sorteo válido")
}

function mostrar(grupos){
let letras=["A","B","C","D","E","F","G","H"]
let html=""

grupos.forEach((g,i)=>{
html+=`<div class="grupo"><h3>Grupo ${letras[i]}</h3>${g.map(t=>`<div class="team"><img class="logo" src="${logo(t)}" alt="Escudo ${t.nombre}"><span class="flag" title="${countryNames[t.pais]||t.pais}">${flag(t.pais)}</span><span>${t.nombre}</span><span class="country">${countryNames[t.pais]||t.pais}</span></div>`).join("")}</div>`
})

gruposDiv.innerHTML=html

// guardar en URL
let data=btoa(JSON.stringify(grupos))
history.replaceState(null,"","?sorteo="+data)
}

async function sortearPasoAPaso(){
let box=document.getElementById("drawBox")
box.innerText="Preparando bolilleros...";await esperar(700)
box.innerText="Sorteando cabezas de serie...";await esperar(700)
let sorteoFinal=generarSorteo()
let grupos=sorteoFinal.map(g=>[g[0]])
mostrar(grupos)
await esperar(700)
box.innerText="Bolillero 2"
for(let i=0;i<grupos.length;i++)grupos[i].push(sorteoFinal[i][1])
mostrar(grupos)
await esperar(700)
box.innerText="Bolillero 3"
for(let i=0;i<grupos.length;i++)grupos[i].push(sorteoFinal[i][2])
mostrar(grupos)
await esperar(700)
box.innerText="Bolillero 4"
for(let i=0;i<grupos.length;i++)grupos[i].push(sorteoFinal[i][3])
mostrar(grupos)
box.innerText="Sorteo terminado"
}

function esperar(ms){return new Promise(r=>setTimeout(r,ms))}

function simularCentral(){
let conteo={}
for(let i=0;i<5000;i++){
let grupos=generarSorteo()
grupos.forEach((g,gi)=>{
let grupo=String.fromCharCode(65+gi)
if(g.find(t=>t.nombre=="Rosario Central")){
conteo[grupo]=(conteo[grupo]||0)+1
}
})
}
let texto="Probabilidad de grupo para Rosario Central (5000 simulaciones):<br><br>"
Object.keys(conteo).sort().forEach(g=>{texto+=`Grupo ${g}: ${conteo[g]}<br>`})
stats.innerHTML=texto
}

function probabilidadRivales(){
let conteo={}
for(let i=0;i<5000;i++){
let grupos=generarSorteo()
let g=grupos.find(gr=>gr.find(t=>t.nombre=="Rosario Central"))
g.forEach(t=>{
if(t.nombre!="Rosario Central"){
conteo[t.nombre]=(conteo[t.nombre]||0)+1
}
})
}

let texto="Probabilidad de rivales de Rosario Central:<br><br>"
Object.keys(conteo).sort((a,b)=>conteo[b]-conteo[a]).forEach(t=>{
texto+=`${t}: ${conteo[t]} veces<br>`
})

stats.innerHTML=texto
}

function simular1000(){for(let i=0;i<1000;i++)generarSorteo();alert("1000 sorteos simulados")}

function generarTextoSorteo(){
const params=new URLSearchParams(window.location.search)
if(!params.get("sorteo"))return null
const grupos=JSON.parse(atob(params.get("sorteo")))
const letras=["A","B","C","D","E","F","G","H"]
let txt="🏆 Sorteo Copa Libertadores 2026\n\n"
grupos.forEach((g,i)=>{
txt+=`GRUPO ${letras[i]}\n`
g.forEach(t=>{txt+=`  ${countryNames[t.pais]||t.pais} - ${t.nombre}\n`})
txt+="\n"
})
return txt
}

function compartir(){
const txt=generarTextoSorteo()
if(!txt){alert("Primero hacé el sorteo.");return}
document.getElementById("shareText").value=txt
document.getElementById("shareModal").classList.add("active")
document.getElementById("shareText").select()
}

function copiarTexto(){
const ta=document.getElementById("shareText")
ta.select();ta.setSelectionRange(0,99999)
try{document.execCommand("copy");alert("✅ Copiado!")}catch(e){alert("Seleccioná el texto manualmente y copialo con Ctrl+C")}
}

function abrirWhatsApp(){
const txt=generarTextoSorteo()
if(txt)window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank")
}

function cerrarModal(){
document.getElementById("shareModal").classList.remove("active")
}

const gruposDiv=document.getElementById("grupos")

// cargar sorteo desde URL
const params=new URLSearchParams(window.location.search)
if(params.get("sorteo")){
let grupos=JSON.parse(atob(params.get("sorteo")))
mostrar(grupos)
}

mostrarBolilleros()

</script>
</body>
</html>
